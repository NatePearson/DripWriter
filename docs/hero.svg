<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="DripWriter — human, variable-speed auto-typing for macOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1830"/>
      <stop offset="1" stop-color="#05080F"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="22" fill="url(#glow)"/>
  <rect x="1" y="1" width="1198" height="418" rx="21" fill="none" stroke="#1E2A44" stroke-width="2"/>

  <!-- caret + faux typed line -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">
    <text x="72" y="232" fill="#5B6B86">$ </text>
    <text x="100" y="232" fill="#C7D3E6">the quick brown fox jum</text>
    <rect x="382" y="212" width="12" height="26" rx="2" fill="#60A5FA"/>
  </g>

  <!-- wordmark -->
  <text x="70" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="82" font-weight="800" fill="#F1F5F9" letter-spacing="-1">DripWriter</text>
  <text x="74" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="24" font-weight="500" fill="#8FA3C0">Human, variable-speed auto-typing for macOS</text>

  <!-- feature chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="19" font-weight="600">
    <g transform="translate(72,300)">
      <rect width="196" height="46" rx="23" fill="#0E1628" stroke="#3B82F6" stroke-opacity="0.6"/>
      <text x="98" y="30" text-anchor="middle" fill="#9DC0FF">Variable WPM drift</text>
    </g>
    <g transform="translate(288,300)">
      <rect width="170" height="46" rx="23" fill="#0E1628" stroke="#3B82F6" stroke-opacity="0.6"/>
      <text x="85" y="30" text-anchor="middle" fill="#9DC0FF">Self-correcting typos</text>
    </g>
    <g transform="translate(478,300)">
      <rect width="150" height="46" rx="23" fill="#0E1628" stroke="#3B82F6" stroke-opacity="0.6"/>
      <text x="75" y="30" text-anchor="middle" fill="#9DC0FF">Humanize pass</text>
    </g>
    <g transform="translate(648,300)">
      <rect width="146" height="46" rx="23" fill="url(#blue)"/>
      <text x="73" y="30" text-anchor="middle" fill="#FFFFFF">Max Human</text>
    </g>
  </g>

  <!-- decorative window dots -->
  <g transform="translate(1086,40)">
    <circle cx="0" cy="0" r="9" fill="#FF5F57"/>
    <circle cx="28" cy="0" r="9" fill="#FEBC2E"/>
    <circle cx="56" cy="0" r="9" fill="#28C840"/>
  </g>

  <!-- big speed glyph -->
  <g transform="translate(980,150)" opacity="0.92">
    <path d="M0 120 C 40 40, 120 40, 160 110 S 280 180, 320 90" fill="none" stroke="url(#blue)" stroke-width="6" stroke-linecap="round" filter="url(#soft)"/>
    <path d="M0 120 C 40 40, 120 40, 160 110 S 280 180, 320 90" fill="none" stroke="url(#blue)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
